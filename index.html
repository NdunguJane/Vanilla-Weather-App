<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla Weather App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <div class="container">
      <header>
        <img
          src="https://s3.amazonaws.com/shecodesio-development/uploads/files/000/000/001/original/logo.png?1627901693"
          alt="SheCodes Logo"
          class="logo"
        />
      </header>
      <form id="search-form">
        <input
          type="text"
          id="city-input"
          placeholder="Enter a city..."
          autocomplete="off"
          required
        />
        <button type="submit">Search</button>
      </form>
      <main>
        <div class="weather-card">
          <h1 id="city-name">Nairobi</h1>
          <p id="current-date-time"></p>
          <div id="weather-icon"></div>
          <div class="temperature"><span id="temperature">22</span>°</div>
          <div class="description" id="description">Clear Sky</div>
          <div class="feels-like">
            Feels like
            <span id="feels-like">24</span>°
          </div>
          <div class="weather-details">
            <div>
              Humidity
              <strong><span id="humidity">64</span>%</strong>
            </div>
            <div>
              Wind
              <strong><span id="wind-speed">3</span> km/h</strong>
            </div>
          </div>
        </div>
      </main>
      <footer>
        Coded by Jane Ndungu |
        <a
          href="https://github.com/NdunguJane/Vanilla-Weather-App"
          target="_blank"
        >
          Open-source on GitHub
        </a>
        | Hosted on
        <a href="https://vanilla-weather-app.netlify.app" target="_blank"
          >Netlify</a
        >
      </footer>
    </div>
    <script src="index.js"></script>
  </body>
</html>
